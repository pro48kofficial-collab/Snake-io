<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Battle FIX</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1020;
    overflow: hidden;
    color: white;
}

.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}
.active { display: flex; }

button {
    padding: 12px 18px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    background: #1e90ff;
    color: white;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

#avatarPreview {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    margin: 10px;
    border: 2px solid white;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">

    <h2>🐍 Snake Battle</h2>

    <img id="avatarPreview" style="display:none">

    <input id="nickname" placeholder="Введи нік">
    <input type="file" id="avatarInput">

    <p>Coins: <span id="coins">0</span></p>

    <button onclick="startGame()">Грати</button>
    <button onclick="openShop()">Магазин</button>

</div>

<!-- SHOP -->
<div id="shop" class="screen">
    <h2>🛒 Магазин</h2>

    <button onclick="buySkin('cyan',10)">Cyan</button>
    <button onclick="buySkin('red',20)">Red</button>
    <button onclick="buySkin('yellow',30)">Yellow</button>

    <button onclick="backMenu()">Назад</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

    <div id="hud">Coins: <span id="hudCoins"></span></div>

    <canvas id="canvas"></canvas>

</div>

<script>

const menu = document.getElementById("menu");
const shop = document.getElementById("shop");
const game = document.getElementById("game");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== DATA =====
let coins = +localStorage.getItem("coins") || 0;
let skin = localStorage.getItem("skin") || "cyan";
let nickname = localStorage.getItem("nickname") || "";

document.getElementById("coins").innerText = coins;
document.getElementById("nickname").value = nickname;

// ===== AVATAR =====
let avatar = localStorage.getItem("avatar");

if(avatar){
    document.getElementById("avatarPreview").src = avatar;
    document.getElementById("avatarPreview").style.display = "block";
}

// ===== INPUTS =====
document.getElementById("nickname").oninput = e=>{
    localStorage.setItem("nickname", e.target.value);
};

document.getElementById("avatarInput").onchange = e=>{
    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(){
        avatar = reader.result;
        localStorage.setItem("avatar", avatar);
        document.getElementById("avatarPreview").src = avatar;
        document.getElementById("avatarPreview").style.display = "block";
    }

    reader.readAsDataURL(file);
};

// ===== NAV =====
function startGame(){
    menu.classList.remove("active");
    game.classList.add("active");
    initGame();
}

function openShop(){
    menu.classList.remove("active");
    shop.classList.add("active");
}

function backMenu(){
    shop.classList.remove("active");
    menu.classList.add("active");
}

// ===== SHOP =====
function buySkin(color, price){
    if(coins >= price){
        coins -= price;
        skin = color;
        save();
        alert("Куплено!");
    } else alert("Нема коінів");
}

// ===== SAVE =====
function save(){
    localStorage.setItem("coins", coins);
    localStorage.setItem("skin", skin);
    document.getElementById("coins").innerText = coins;
}

// ===== GAME =====
let snake, food, cameraX=0, cameraY=0, alive=true;

function initGame(){

alive = true;

snake = {
    x: 300,
    y: 300,
    angle: 0,
    body: []
};

food = [];
for(let i=0;i<80;i++){
    food.push({
        x: Math.random()*2000,
        y: Math.random()*2000
    });
}

requestAnimationFrame(loop);
}

// ===== CONTROL =====
document.addEventListener("mousemove", e=>{
    snake.angle = Math.atan2(e.clientY - snake.y, e.clientX - snake.x);
});

// ===== DIE =====
function die(){
    alive = false;
    coins += 10;
    save();

    setTimeout(()=>{
        backMenu();
        alert("Ти помер 💀 +10 коінів");
    },100);
}

// ===== LOOP =====
function loop(){

if(!alive) return;

// MOVE
snake.x += Math.cos(snake.angle)*3;
snake.y += Math.sin(snake.angle)*3;

snake.body.push({x:snake.x,y:snake.y});
if(snake.body.length>60) snake.body.shift();

// CAMERA
cameraX = snake.x - canvas.width/2;
cameraY = snake.y - canvas.height/2;

// FOOD
for(let i=0;i<food.length;i++){
    let f = food[i];

    let dx = snake.x - f.x;
    let dy = snake.y - f.y;

    if(Math.sqrt(dx*dx+dy*dy)<10){
        food.splice(i,1);
        food.push({
            x: Math.random()*2000,
            y: Math.random()*2000
        });

        snake.body.push({x:snake.x,y:snake.y});
        coins++;
        save();
    }
}

// DRAW
ctx.clearRect(0,0,canvas.width,canvas.height);

// FOOD
ctx.fillStyle="lime";
food.forEach(f=>{
    ctx.fillRect(f.x-cameraX,f.y-cameraY,5,5);
});

// SNAKE
ctx.fillStyle=skin;
snake.body.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x-cameraX,p.y-cameraY,6,0,Math.PI*2);
    ctx.fill();
});

document.getElementById("hudCoins").innerText = coins;

requestAnimationFrame(loop);
}

</script>

</body>
    </html>
