<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Battle Arena</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1020;
    overflow: hidden;
    color: white;
}

.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}
.active { display: flex; }

button {
    padding: 12px 18px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    background: #1e90ff;
    color: white;
    font-size: 16px;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

#avatarPreview {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    margin: 10px;
    border: 2px solid white;
    object-fit: cover;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}

#exitBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 20;
    display: none;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
    <h2>🐍 Snake Battle</h2>

    <img id="avatarPreview" style="display:none">

    <input id="nickname" placeholder="Нік">
    <input type="file" id="avatarInput">

    <p>Coins: <span id="coins">0</span></p>

    <button onclick="startGame()">Грати</button>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
    <h2>Магазин скінів</h2>

    <button onclick="buySkin('cyan',10)">Cyan</button>
    <button onclick="buySkin('red',15)">Red</button>
    <button onclick="buySkin('yellow',20)">Yellow</button>
    <button onclick="buySkin('purple',25)">Purple</button>
    <button onclick="buySkin('lime',30)">Lime</button>
    <button onclick="backMenu()">Назад</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
    <div id="hud">Coins: <span id="hudCoins"></span></div>
    <button id="exitBtn" onclick="exitGame()">Вийти</button>
    <canvas id="canvas"></canvas>
</div>

<script>

const menu = document.getElementById("menu");
const shop = document.getElementById("shop");
const game = document.getElementById("game");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== SAVE =====
let coins = +localStorage.getItem("coins") || 0;
let skin = localStorage.getItem("skin") || "cyan";

document.getElementById("coins").innerText = coins;

// ===== PROFILE =====
let avatar = localStorage.getItem("avatar");
if(avatar){
    document.getElementById("avatarPreview").src = avatar;
    document.getElementById("avatarPreview").style.display = "block";
}

// ===== NAV =====
function startGame(){
    menu.classList.remove("active");
    game.classList.add("active");
    document.getElementById("exitBtn").style.display = "block";
    initGame();
}

function openShop(){
    menu.classList.remove("active");
    shop.classList.add("active");
}

function backMenu(){
    shop.classList.remove("active");
    menu.classList.add("active");
}

// ===== EXIT =====
function exitGame(){
    alive = false;
    game.classList.remove("active");
    menu.classList.add("active");
    document.getElementById("exitBtn").style.display = "none";
}

// ===== SHOP =====
function buySkin(color, price){
    if(coins >= price){
        coins -= price;
        skin = color;
        save();
        alert("Куплено!");
    } else alert("Немає коінів");
}

// ===== SAVE =====
function save(){
    localStorage.setItem("coins", coins);
    localStorage.setItem("skin", skin);
    document.getElementById("coins").innerText = coins;
}

// ===== GAME STATE =====
let snake, food, bots;
let alive = true;
let cameraX = 0;
let cameraY = 0;

// ===== INIT =====
function initGame(){

alive = true;

snake = {
    x: 300,
    y: 300,
    angle: 0,
    body: []
};

food = [];
for(let i=0;i<100;i++){
    food.push({
        x: Math.random()*2000,
        y: Math.random()*2000
    });
}

bots = [];
let colors = ["red","yellow","purple","orange","blue","pink","lime"];
for(let i=0;i<8;i++){
    bots.push({
        x: Math.random()*2000,
        y: Math.random()*2000,
        angle: Math.random()*Math.PI*2,
        body: [],
        color: colors[i]
    });
}

requestAnimationFrame(loop);
}

// ===== CONTROL =====
document.addEventListener("mousemove", e=>{
    snake.angle = Math.atan2(e.clientY - snake.y, e.clientX - snake.x);
});

// ===== DIE =====
function die(){
    alive = false;
    coins += 10;
    save();

    setTimeout(()=>{
        exitGame();
        alert("Ти помер 💀 +10 коінів");
    },200);
}

// ===== LOOP =====
function loop(){

if(!alive) return;

// MOVE PLAYER
snake.x += Math.cos(snake.angle)*3;
snake.y += Math.sin(snake.angle)*3;

snake.body.push({x:snake.x,y:snake.y});
if(snake.body.length > 60) snake.body.shift();

// CAMERA FOLLOW PLAYER
cameraX = snake.x - canvas.width/2;
cameraY = snake.y - canvas.height/2;

// FOOD
for(let i=0;i<food.length;i++){
    let f = food[i];
    let dx = snake.x - f.x;
    let dy = snake.y - f.y;

    if(Math.sqrt(dx*dx+dy*dy)<10){
        food.splice(i,1);
        food.push({
            x: Math.random()*2000,
            y: Math.random()*2000
        });

        snake.body.push({x:snake.x,y:snake.y});
        coins++;
        save();
    }
}

// BOTS
for(let b of bots){
    b.angle += (Math.random()-0.5)*0.2;
    b.x += Math.cos(b.angle)*2;
    b.y += Math.sin(b.angle)*2;

    b.body.push({x:b.x,y:b.y});
    if(b.body.length>40) b.body.shift();
}

// COLLISION (PLAYER DIES)
for(let b of bots){
    forlet(p of b.body){
        let dx = snake.x - p.x;
        let dy = snake.y - p.y;

        if(Math.sqrt(dx*dx+dy*dy)<8){
            die();
        }
    }
}

// BOT DEATH
for(let bi=0; bi<bots.length; bi++){
    let b = bots[bi];

    for(let p of snake.body){
        let dx = b.x - p.x;
        let dy = b.y - p.y;

        if(Math.sqrt(dx*dx+dy*dy)<8){
            bots.splice(bi,1);
            coins += 2;
            save();
            break;
        }
    }
}

// DRAW
ctx.clearRect(0,0,canvas.width,canvas.height);

// FOOD
ctx.fillStyle="lime";
for(let f of food){
    ctx.fillRect(f.x-cameraX,f.y-cameraY,5,5);
}

// PLAYER
drawSnake(snake.body, skin);

// BOTS
for(let b of bots){
    drawSnake(b.body, b.color);
}

document.getElementById("hudCoins").innerText = coins;

requestAnimationFrame(loop);
}

// ===== DRAW =====
function drawSnake(body,color){
    ctx.fillStyle = color;

    for(let p of body){
        ctx.beginPath();
        ctx.arc(p.x-cameraX, p.y-cameraY, 6, 0, Math.PI*2);
        ctx.fill();
    }
}

</script>

</body>
    </html>
