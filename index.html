<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Battle Arena</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1020;
    overflow: hidden;
    color: white;
}

.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

.active { display: flex; }

button {
    padding: 12px 18px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    background: #1e90ff;
    color: white;
    font-size: 16px;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

#avatarPreview {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    margin: 10px;
    border: 2px solid white;
    object-fit: cover;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}

#exitBtn{
    position:absolute;
    top:10px;
    right:10px;
    z-index:11;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
    <h2>🐍 Snake Battle</h2>

    <img id="avatarPreview" style="display:none">

    <input id="nickname" placeholder="Введи нік">
    <input type="file" id="avatarInput">

    <p>Coins: <span id="coins">0</span></p>

    <button onclick="startGame()">Грати</button>
    <button onclick="openShop()">Магазин</button>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
    <h2>Магазин</h2>

    <button onclick="buySkin('cyan',10)">Cyan (10)</button>
    <button onclick="buySkin('red',20)">Red (20)</button>
    <button onclick="buySkin('yellow',30)">Yellow (30)</button>
    <button onclick="buySkin('purple',40)">Purple (40)</button>

    <button onclick="backMenu()">Назад</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
    <div id="hud">Coins: <span id="hudCoins"></span></div>
    <button id="exitBtn" onclick="exitGame()">Вийти</button>
    <canvas id="canvas"></canvas>
</div>

<script>

const menu = document.getElementById("menu");
const shop = document.getElementById("shop");
const game = document.getElementById("game");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ===== SAVE =====
let coins = +localStorage.getItem("coins") || 0;
let skin = localStorage.getItem("skin") || "cyan";

document.getElementById("coins").innerText = coins;

// avatar
let avatar = localStorage.getItem("avatar");
if(avatar){
    document.getElementById("avatarPreview").src = avatar;
    document.getElementById("avatarPreview").style.display = "block";
}

// nickname
document.getElementById("nickname").oninput = e=>{
    localStorage.setItem("nickname", e.target.value);
};

// avatar upload
document.getElementById("avatarInput").onchange = e=>{
    let file = e.target.files[0];
    let reader = new FileReader();
    reader.onload = function(){
        avatar = reader.result;
        localStorage.setItem("avatar", avatar);
        document.getElementById("avatarPreview").src = avatar;
        document.getElementById("avatarPreview").style.display = "block";
    }
    reader.readAsDataURL(file);
};

// ===== NAV =====
function startGame(){
    menu.classList.remove("active");
    game.classList.add("active");
    initGame();
}

function openShop(){
    menu.classList.remove("active");
    shop.classList.add("active");
}

function backMenu(){
    shop.classList.remove("active");
    menu.classList.add("active");
}

// ===== SHOP =====
function buySkin(color, price){
    if(coins >= price){
        coins -= price;
        skin = color;
        save();
        alert("Куплено!");
    } else alert("Нема коінів");
}

// ===== SAVE =====
function save(){
    localStorage.setItem("coins", coins);
    localStorage.setItem("skin", skin);
    document.getElementById("coins").innerText = coins;
}

// ===== GAME STATE =====
let snake, food, bots;
let running = false;
let alive = true;

let camera = {x:0,y:0};

// ===== CONTROL =====
let turnLeft = false;
let turnRight = false;
let targetAngle = 0;

// keyboard
document.addEventListener("keydown", e=>{
    if(e.key === "ArrowLeft" || e.key === "a") turnLeft = true;
    if(e.key === "ArrowRight" || e.key === "d") turnRight = true;
});
document.addEventListener("keyup", e=>{
    if(e.key === "ArrowLeft" || e.key === "a") turnLeft = false;
    if(e.key === "ArrowRight" || e.key === "d") turnRight = false;
});

// mouse
document.addEventListener("mousemove", e=>{
    if(!snake) return;
    targetAngle = Math.atan2(e.clientY - snake.y, e.clientX - snake.x);
});

// touch
document.addEventListener("touchmove", e=>{
    if(!snake) return;
    let t = e.touches[0];
    targetAngle = Math.atan2(t.clientY - snake.y, t.clientX - snake.x);
});

// ===== INIT =====
function initGame(){

running = true;
alive = true;

snake = {
    x: 300,
    y: 300,
    angle: 0,
    body: []
};

food = [];
for(let i=0;i<80;i++){
    food.push({
        x: Math.random()*2000,
        y: Math.random()*2000
    });
}

bots = [];
let colors = ["red","yellow","purple","orange","blue","lime"];

for(let i=0;i<7;i++){
    bots.push({
        x: Math.random()*2000,
        y: Math.random()*2000,
        angle: Math.random()*Math.PI*2,
        body: [],
        color: colors[i]
    });
}

requestAnimationFrame(loop);
}

// ===== EXIT =====
function exitGame(){
    running = false;
    game.classList.remove("active");
    menu.classList.add("active");
}

// ===== DIE =====
function die(){
    alive = false;
    coins += 10;
    save();

    setTimeout(()=>{
        exitGame();
    },300);
}

// ===== LOOP =====
function loop(){
if(!running) return;
if(!alive) return;

// CONTROL
if(turnLeft) snake.angle -= 0.05;
if(turnRight) snake.angle += 0.05;

snake.angle += (targetAngle - snake.angle) * 0.08;

// MOVE
snake.x += Math.cos(snake.angle)*3;
snake.y += Math.sin(snake.angle)*3;

snake.body.push({x:snake.x,y:snake.y});
if(snake.body.length > 60) snake.body.shift();

// CAMERA
camera.x = snake.x - canvas.width/2;
camera.y = snake.y - canvas.height/2;

// FOOD
for(let i=0;i<food.length;i++){
    let f = food[i];

    if(Math.hypot(snake.x-f.x,snake.y-f.y) < 12){
        food.splice(i,1);
        food.push({
            x: Math.random()*2000,
            y: Math.random()*2000
        });

        coins++;
        save();
    }
}

// BOTS
for(let b of bots){
    b.angle += (Math.random()-0.5)*0.2;
    b.x += Math.cos(b.angle)*2;
    b.y += Math.sin(b.angle)*2;

    b.body.push({x:b.x,y:b.y});
    if(b.body.length > 40) b.body.shift();
}

// COLLISION
for(let b of bots){
    for(let p of b.body){
        if(Math.hypot(snake.x-p.x,snake.y-p.y) < 8){
            die();
        }
    }
}

// DRAW
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.save();
ctx.translate(-camera.x,-camera.y);

// food
ctx.fillStyle="lime";
for(let f of food){
    ctx.fillRect(f.x,f.y,6,6);
}

// snake
drawSnake(snake.body, skin);

// bots
for(let b of bots){
    drawSnake(b.body, b.color);
}

ctx.restore();

// HUD
document.getElementById("hudCoins").innerText = coins;

requestAnimationFrame(loop);
}

// ===== DRAW =====
function drawSnake(body,color){
    ctx.fillStyle = color;
    for(let p of body){
        ctx.beginPath();
        ctx.arc(p.x,p.y,6,0,Math.PI*2);
        ctx.fill();
    }
}

</script>

</body>
    </html>
